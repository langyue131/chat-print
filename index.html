<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信聊天记录合并A4打印（自用超清版）</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{padding:20px;max-width:600px;margin:0 auto;background:#f6f7f9}
        .title{text-align:center;font-size:20px;margin-bottom:6px;font-weight:bold}
        .tip{text-align:center;color:#666;font-size:14px;margin-bottom:22px}
        .upload{border:2px dashed #ccc;padding:35px 20px;text-align:center;border-radius:10px;background:#fff;margin-bottom:20px}
        .preview{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
        .preview img{width:100%;height:180px;object-fit:cover;border-radius:6px}
        .btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;margin:8px 0;color:#fff;background:#007AFF}
        .footer{text-align:center;font-size:11px;color:#999;margin-top:30px;line-height:1.5}
    </style>
</head>
<body>

<div class="title">微信聊天记录合并A4打印</div>
<div class="tip">个人自用｜超清无损｜4张合并</div>

<div class="upload" id="upload">点击上传 4 张聊天截图</div>
<input type="file" id="file" accept="image/*" multiple hidden>

<div class="preview" id="preview"></div>

<button class="btn" id="exportHd">导出超清PDF</button>

<div class="footer">
    本工具仅排版，不修改图片内容<br>
    证据真实性由用户自行负责
</div>

<script>
const upload = document.getElementById('upload');
const file = document.getElementById('file');
const preview = document.getElementById('preview');
const exportHd = document.getElementById('exportHd');

let images = [];

upload.onclick = () => file.click();
file.onchange = (e) => {
    let arr = Array.from(e.target.files).slice(0,4);
    if(arr.length !==4){alert('请上传4张图片');return}
    images = []; preview.innerHTML = '';
    arr.forEach(f=>{
        let reader = new FileReader();
        reader.onload = (ev)=>{
            let img = new Image();
            img.src = ev.target.result;
            preview.appendChild(img);
            images.push(ev.target.result);
        }
        reader.readAsDataURL(f);
    })
}

exportHd.onclick = async ()=>{
    if(images.length!==4){alert('请先上传4张图片');return}
    await makePDF(true);
}

async function makePDF(hd){
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({
        orientation: 'p',
        unit: 'mm',
        format: 'a4',
        compress: false
    });

    const w = 100;
    const h = 135;

    pdf.addImage(images[0], 'PNG', 5, 12, w, h, '', 'FAST');
    pdf.addImage(images[1], 'PNG', 105, 12, w, h, '', 'FAST');
    pdf.addImage(images[2], 'PNG', 5, 152, w, h, '', 'FAST');
    pdf.addImage(images[3], 'PNG', 105, 152, w, h, '', 'FAST');

    pdf.save('聊天记录合并_超清版.pdf');
}
</script>
</body>
</html>

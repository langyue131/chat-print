<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信聊天记录合并A4打印</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{padding:20px;max-width:500px;margin:0 auto;background:#f6f7f9}
        .title{text-align:center;font-size:19px;margin-bottom:6px;font-weight:bold}
        .tip{text-align:center;color:#666;font-size:13px;margin-bottom:22px}
        .upload{border:2px dashed #ccc;padding:35px 20px;text-align:center;border-radius:10px;background:#fff;margin-bottom:20px}
        .preview{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
        .preview img{width:100%;height:170px;object-fit:cover;border-radius:6px}
        .btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;margin:8px 0;color:#fff}
        .btn-blue{background:#007AFF}
        .btn-orange{background:#FF9500}
        .ad{text-align:center;font-size:12px;color:#FF3B30;margin:10px 0}
        .footer{text-align:center;font-size:11px;color:#999;margin-top:30px;line-height:1.5}
    </style>
</head>
<body>

<div class="title">微信聊天记录合并A4打印</div>
<div class="tip">适用于起诉证据固定｜4张合并成1张A4</div>

<div class="upload" id="upload">点击上传 4 张聊天截图</div>
<input type="file" id="file" accept="image/*" multiple hidden>

<div class="preview" id="preview"></div>

<button class="btn btn-blue" id="exportFree">免费导出标清PDF</button>
<button class="btn btn-orange" id="exportHd">🔒 观看广告解锁高清导出</button>

<div class="ad">高清无压缩、无水印，法院打印更清晰</div>

<div class="footer">
    本工具仅排版，不修改图片内容<br>
    证据真实性由用户自行负责
</div>

<script>
const upload = document.getElementById('upload');
const file = document.getElementById('file');
const preview = document.getElementById('preview');
const exportFree = document.getElementById('exportFree');
const exportHd = document.getElementById('exportHd');

let images = [];
let unlocked = false;

upload.onclick = () => file.click();
file.onchange = (e) => {
    let arr = Array.from(e.target.files).slice(0,4);
    if(arr.length !==4){alert('请上传4张图片');return}
    images = []; preview.innerHTML = '';
    arr.forEach(f=>{
        let reader = new FileReader();
        reader.onload = (ev)=>{
            let img = new Image();
            img.src = ev.target.result;
            preview.appendChild(img);
            images.push(ev.target.result);
        }
        reader.readAsDataURL(f);
    })
}

exportFree.onclick = async ()=>{
    if(images.length!==4){alert('请先上传4张图片');return}
    await makePDF(false);
}

exportHd.onclick = async ()=>{
    if(images.length!==4){alert('请先上传4张图片');return}
    if(!unlocked){
        if(confirm('观看广告即可解锁高清\n确定观看？')){
            unlocked = true;
            exportHd.innerText = '✅ 已解锁高清，点击导出';
            alert('解锁成功！');
        }
        return;
    }
    await makePDF(true);
}

async function makePDF(hd){
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');
    pdf.addImage(images[0],'JPG',5,12,100,135);
    pdf.addImage(images[1],'JPG',105,12,100,135);
    pdf.addImage(images[2],'JPG',5,152,100,135);
    pdf.addImage(images[3],'JPG',105,152,100,135);
    pdf.save('聊天记录合并'+(hd?'高清版':'免费版')+'.pdf');
}
</script>
</body>
</html>
